version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      microsoft:
        patterns:
          - "Microsoft.*"
          - "System.*"
      serilog:
        patterns:
          - "Serilog*"
      test-packages:
        patterns:
          - "xunit*"
          - "Microsoft.NET.Test.Sdk"
      protobuf:
        patterns:
          - "Google.Protobuf"
          - "Grpc.Tools"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    groups:
      github-actions:
        patterns:
          - "*"
