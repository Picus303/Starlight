name: PR CI

on:
  pull_request:
  push:
    branches:
      - master

concurrency:
  group: pr-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Starlight.slnx

      - name: Build
        run: dotnet build Starlight.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Starlight.slnx --configuration Release --no-build --logger "trx;LogFileName=Starlight.Tests.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: Tests/**/TestResults
