syntax = "proto3";

option csharp_namespace = "Starlight.Game.Protocol";

message NCNPDMHMHGA {
  map<uint32, uint32> open_state_map = 1;
  uint32 uid = 2;
}

message GetPlayerTokenReq {
  string psn_id = 1;
  string ticket = 2;
  string online_id = 3;
  string auth_appid = 4;
  string client_rand_key = 5;
  string birthday = 6;
  string account_uid = 7;
  string account_token = 8;
  uint32 authkey_ver = 9;
  uint32 platform_type = 10;
  uint32 sign_type = 11;
  bool is_guest = 12;
  uint32 key_id = 13;
  uint32 uid = 14;
}

message PlayerEnterSceneNotify {
  uint32 enter_scene_token = 1;
  bool is_first_login_enter_scene = 2;
  uint32 target_uid = 3;
  uint32 enter_reason = 4;
  repeated uint32 scene_tag_id_list = 5;
  uint32 prev_scene_id = 6;
  uint64 scene_begin_time = 7;
  uint32 world_level = 8;
  uint32 world_type = 9;
  uint32 scene_id = 10;
  uint32 dungeon_id = 11;
  bool is_skip_ui = 12;
  string scene_transaction = 13;
}

message IEMHBJDLKHL {
  repeated int32 option_list = 1;
}
